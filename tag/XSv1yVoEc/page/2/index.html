                                        <p>最近张老师对半素数感兴趣。半素数(semi-prime)是可以表示成两个素数乘积的数。比如4和10是半素数，因为4=2×2，10=2×5。而8不是半素数，因为8=2×2×2。他想知道某一个l到r的闭区间内有多少个这样的数。但是这个问题太困难了，他想让你帮他解决。</p>
